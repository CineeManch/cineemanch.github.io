<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews - CineeManch</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

/* ================= GLOBAL ================= */
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ================= CONTAINER ================= */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

/* ================= NAVBAR ================= */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 14px 30px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: rgba(10,10,10,0.65);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 1000;
}

.logo {
    font-size: 22px;
    font-weight: 700;
}

.logo span { color: #ff2d2d; }

.logo small {
    display: block;
    font-size: 11px;
    color: #aaa;
}

.nav-links {
    display: flex;
    gap: 22px;
    justify-self: center;
}

.nav-links a {
    color: #ddd;
    text-decoration: none;
    font-size: 14px;
    white-space: nowrap;
    position: relative;
}

.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 2px;
    background: #ff2d2d;
    transition: 0.3s;
}

.nav-links a:hover,
.nav-links .active {
    color: #fff;
}

.nav-links a:hover::after,
.nav-links .active::after {
    width: 100%;
}

/* ================= BANNER ================= */
.banner {
    height: 42vh;
    background: url("Banner 2.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
}

.banner h1 {
    position: relative;
    font-size: 46px;
    padding: 12px 24px;
    border: 2px solid rgba(255,45,45,0.4);
    background: rgba(0,0,0,0.4);
}

/* ================= REVIEWS ================= */
.reviews {
    padding: 50px 0;
}

/* REVIEW CARD */
.review-item {
    display: flex;
    gap: 25px;
    margin-bottom: 40px;
    align-items: center;

    background: #0b0b0b;
    padding: 18px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
}

.review-item:hover {
    transform: translateY(-4px);
    border-color: rgba(255,45,45,0.3);
}

/* VIDEO */
.video-wrapper {
    width: 40%;
    max-width: 420px;
    aspect-ratio: 16 / 9;
}

.video-wrapper iframe {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    border: none;
}

/* TEXT */
.review-text {
    width: 60%;
}

.review-text h2 {
    margin-top: 0;
    color: #ff2d2d;
    font-size: 18px;
}

.review-text p {
    color: #ccc;
    line-height: 1.6;
    font-size: 14px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

    .navbar {
        grid-template-columns: 1fr auto;
    }

    .nav-links {
        display: none;
    }

    .review-item {
        flex-direction: column;
        text-align: center;
    }

    .video-wrapper,
    .review-text {
        width: 100%;
    }

    .banner h1 {
        font-size: 30px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Cinee<span>Manch</span>
        <small>सिनेमंच</small>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="reviews.html" class="active">Reviews</a>
        <a href="#">Recommended</a>
        <a href="#">Box Office</a>
        <a href="#">About</a>
    </div>

</div>

<!-- BANNER -->
<div class="banner">
    <h1>Reviews</h1>
</div>

<!-- REVIEWS (DYNAMIC STEP 5) -->
<div class="container reviews">

    {% for post in site.posts %}

    <div class="review-item">

        <div class="video-wrapper">
            <iframe src="{{ post.video }}" allowfullscreen></iframe>
        </div>

        <div class="review-text">
            <h2>{{ post.title }}</h2>
            <p>{{ post.description }}</p>
        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
