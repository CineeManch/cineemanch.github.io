<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: url("Banner.png") center/cover no-repeat;
  display: flex;
  align-items: center;
  padding-left: 20px;
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, black, transparent);
}

/* TEXT */
.hero-content {
  position: relative;
}

.hero-content h1 {
  font-size: 40px;
}

.hero-content span {
  color: red;
}

.hero-content p {
  color: #ccc;
}
</style>

</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Cinee<span>Manch</span></h1>
    <p>सिनेमा की हर बात, हमारे साथ</p>
  </div>
</div>

</body>
</html>
