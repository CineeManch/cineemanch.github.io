---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineeManch - Home</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    width: 100%;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
    overflow: hidden; /* 🔥 NO SCROLL ON DESKTOP */
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    padding: 0 4%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 1000;
}

.logo {
    font-size: 20px;
    font-weight: 700;
}
.logo span { color: #ff2d2d; }
.logo small {
    font-size: 10px;
    color: #aaa;
    display: block;
}

.nav-links {
    display: flex;
    gap: 18px;
}

.nav-links a {
    color: #ccc;
    text-decoration: none;
    font-size: 13px;
}

/* ================= MAIN WRAPPER ================= */
.wrapper {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 60px; /* navbar space */
}

/* ================= TOP HERO ================= */
.hero {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 5%;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
                url("Banner 1.png") center/cover no-repeat;
}

.hero-content h1 {
    font-size: 52px;
    margin-bottom: 10px;
}

.hero-content span {
    color: #ff2d2d;
}

.hero-content p {
    color: #bbb;
    font-size: 16px;
}

/* ================= LATEST SECTION ================= */
.latest {
    flex: 1;
    padding: 12px 5%;
    display: flex;
    flex-direction: column;
}

.latest h2 {
    font-size: 18px;
    margin-bottom: 10px;
    border-left: 3px solid #ff2d2d;
    padding-left: 8px;
}

/* ================= VIDEO GRID ================= */
.video-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 columns desktop */
    gap: 12px;
    overflow: hidden;
}

/* VIDEO CARD */
.video-card {
    background: #0f0f0f;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
}

/* compact video */
.video-card iframe {
    width: 100%;
    height: 90px; /* compact height */
    border: none;
}

/* title */
.video-card h3 {
    font-size: 12px;
    padding: 6px 8px;
    color: #ddd;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

    html, body {
        overflow-y: auto; /* allow scroll on mobile */
    }

    .video-grid {
        grid-template-columns: 1fr;
    }

    .hero-content h1 {
        font-size: 34px;
    }

    .hero-content p {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        Cinee<span>Manch</span>
        <small>सिनेमंच</small>
    </div>

    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="reviews.html">Reviews</a>
        <a href="#">About</a>
    </div>
</nav>

<!-- MAIN -->
<div class="wrapper">

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1>Cinee<span>Manch</span></h1>
            <p>सिनेमा की हर बात, हमारे साथ</p>
        </div>
    </section>

    <!-- LATEST -->
    <section class="latest">
        <h2>Latest Reviews</h2>

        <div class="video-grid">
            {% for post in site.posts limit:4 %}
            <div class="video-card">

                {% if post.video %}
                <iframe src="{{ post.video }}" allowfullscreen></iframe>
                {% else %}
                <div style="height:90px; display:flex;align-items:center;justify-content:center;color:#666;">
                    No Video
                </div>
                {% endif %}

                <h3>{{ post.title }}</h3>
            </div>
            {% endfor %}

        </div>
    </section>

</div>

</body>
</html>
