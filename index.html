---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineeManch - Home</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* ================= NAVBAR ================= */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 15px 4%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size: 22px;
    font-weight: 700;
}
.logo span { color: #ff2d2d; }
.logo small {
    font-size: 11px;
    color: #aaa;
    display: block;
}

.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links a {
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
}

/* ================= HERO ================= */
.hero {
    height: 55vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
                url("Banner 1.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    padding: 0 5%;
}

.hero h1 {
    font-size: 50px;
}

.hero span {
    color: #ff2d2d;
}

/* ================= SECTION ================= */
.section {
    max-width: 1200px;
    margin: auto;
    padding: 50px 20px;
}

.section h2 {
    margin-bottom: 20px;
    border-left: 4px solid #ff2d2d;
    padding-left: 10px;
}

/* ================= 4 LATEST GRID ================= */
.latest-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
}

/* CARD */
.card {
    background: #0a0a0a;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #ff2d2d55;
}

/* VIDEO */
.video {
    width: 100%;
    aspect-ratio: 16 / 9;
}

.video iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* TITLE */
.card h3 {
    padding: 10px;
    font-size: 14px;
    color: #ddd;
    line-height: 1.4;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 1024px) {
    .latest-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .latest-grid {
        grid-template-columns: 1fr;
    }

    .hero h1 {
        font-size: 34px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
    <div class="logo">Cinee<span>Manch</span><small>सिनेमंच</small></div>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="reviews.html">Reviews</a>
        <a href="#">About</a>
    </div>
</nav>

<!-- HERO -->
<header class="hero">
    <h1>Cinee<span>Manch</span></h1>
</header>

<!-- LATEST VIDEOS -->
<section class="section">

    <h2>Latest Reviews</h2>

    <div class="latest-grid">

        {% assign sorted_posts = site.posts | sort: "date" | reverse %}

        {% for post in sorted_posts limit:4 %}

        <div class="card">

            {% if post.video %}
            <div class="video">
                <iframe src="{{ post.video }}" allowfullscreen></iframe>
            </div>
            {% endif %}

            <h3>{{ post.title }}</h3>

        </div>

        {% endfor %}

    </div>

</section>

</body>
</html>
