---
layout: default
---

<style>
.post-container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
    background: #000;
    color: #fff;
}

/* VIDEO */
.video-wrapper {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 14px;
    overflow: hidden;
    background: #111;
}

.video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* TEXT */
h1 {
    margin-top: 20px;
    font-size: 28px;
    color: #ff2d2d;
}

.meta {
    color: #aaa;
}

.description {
    margin-top: 20px;
    color: #bbb;
    line-height: 1.8;
}
</style>

<div class="post-container">

    <a href="{{ site.baseurl }}/reviews.html" style="color:#fff;text-decoration:none;opacity:0.7;">
        ← Back to Reviews
    </a>

    <div class="video-wrapper">
        <iframe src="{{ page.video }}" allowfullscreen></iframe>
    </div>

    <h1>{{ page.title }}</h1>

    <div class="meta">⭐ {{ page.rating }}/10</div>

    <div class="description">
        {{ page.description }}
    </div>

</div>
